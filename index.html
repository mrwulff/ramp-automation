<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Logo Generator (Debug)</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #1e1e1e;
            color: #eee;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .controls {
            width: 320px;
            padding: 20px;
            background: #2b2b2b;
        }

        .viewer {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #preview {
            position: relative;
            width: 800px;
            border: 1px solid #444;
        }

        #base {
            width: 100%;
        }

        #logo {
            position: absolute;
            top: 0;
            left: 0;
            cursor: grab;
            transform-origin: top left;
        }

        input,
        button {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
        }

        button {
            background: #4caf50;
            border: none;
            color: white;
            cursor: pointer;
        }

        #debug {
            margin-top: 20px;
            font-size: 12px;
            background: #111;
            padding: 10px;
            height: 150px;
            overflow: auto;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="controls">
            <h3>Logo Tool</h3>

            <input type="file" id="file">

            <label>Scale</label>
            <input type="range" id="scaleSlider" min="1" max="200" value="50">

            <label>Rotate</label>
            <input type="range" id="rotateSlider" min="0" max="360" value="0">

            <label>X</label>
            <input type="number" id="x">

            <label>Y</label>
            <input type="number" id="y">

            <button onclick="generate()">Generate STL</button>

            <div id="debug"></div>
        </div>

        <div class="viewer">
            <div id="preview">
                <img id="base" src="/static/base.png">
                <img id="logo">
            </div>
        </div>

    </div>

    <script>
        console.log(" Script loaded");

        const preview = document.getElementById("preview");
        const logo = document.getElementById("logo");
        const debug = document.getElementById("debug");

        const BLENDER_WIDTH = 111;
        const BLENDER_HEIGHT = 31;

        let posX = 0;
        let posY = 0;
        let scale = 0.5;
        let rotation = 0;

        let dragging = false;
        let offsetX = 0;
        let offsetY = 0;

        // -------- DEBUG LOGGER --------
        function log(msg) {
            console.log(msg);
            debug.innerHTML += msg + "<br>";
        }

        // -------- FILE LOAD --------
        document.getElementById("file").onchange = (e) => {
            log(" File selected");

            const file = e.target.files[0];
            if (!file) {
                log(" No file selected");
                return;
            }

            logo.src = URL.createObjectURL(file);

            posX = 0;
            posY = 0;

            updateTransform();
        };

        // -------- TRANSFORM --------
        function updateTransform() {
            logo.style.left = posX + "px";
            logo.style.top = posY + "px";
            logo.style.transform = `scale(${scale}) rotate(${rotation}deg)`;

            const rect = preview.getBoundingClientRect();

            let bx = (posX / rect.width) * BLENDER_WIDTH;
            let by = (posY / rect.height) * BLENDER_HEIGHT;

            document.getElementById("x").value = bx.toFixed(2);
            document.getElementById("y").value = by.toFixed(2);
        }

        // -------- DRAG --------
        logo.onmousedown = (e) => {
            dragging = true;
            offsetX = e.offsetX;
            offsetY = e.offsetY;
            log("🖱 Drag start");
        };

        document.onmouseup = () => {
            if (dragging) log(" Drag end");
            dragging = false;
        };

        document.onmousemove = (e) => {
            if (!dragging) return;

            const rect = preview.getBoundingClientRect();

            posX = e.clientX - rect.left - offsetX;
            posY = e.clientY - rect.top - offsetY;

            updateTransform();
        };

        // -------- SCALE --------
        document.getElementById("scaleSlider").oninput = (e) => {
            scale = e.target.value / 100;
            log(" Scale: " + scale);
            updateTransform();
        };

        // -------- ROTATE --------
        document.getElementById("rotateSlider").oninput = (e) => {
            rotation = e.target.value;
            log(" Rotation: " + rotation);
            updateTransform();
        };

        // -------- GENERATE --------
        async function generate() {
            log(" Generate clicked");

            let file = document.getElementById("file").files[0];

            if (!file) {
                log(" No file uploaded");
                alert("Upload a file first");
                return;
            }

            let form = new FormData();
            form.append("file", file);
            form.append("x", document.getElementById("x").value || 0);
            form.append("y", document.getElementById("y").value || 0);
            form.append("scale", scale || 1);
            form.append("rotation", rotation || 0);

            log(" Sending request...");

            try {
                let res = await fetch("/generate", {
                    method: "POST",
                    body: form
                });

                log(" Response status: " + res.status);

                if (!res.ok) {
                    let text = await res.text();
                    log(" Server error: " + text);
                    alert(text);
                    return;
                }

                let blob = await res.blob();

                let url = window.URL.createObjectURL(blob);
                let a = document.createElement("a");
                a.href = url;
                a.download = "output.stl";
                a.click();

                log(" STL downloaded");

            } catch (err) {
                console.error(err);
                log(" Request failed");
            }
        }
    </script>

</body>

</html>
